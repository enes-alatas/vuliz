name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run compile

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration
        env:
          # Proxy base URL the app uses to reach the Sonatype OSS Index API.
          # This value is already public (baked into the deployed client bundle).
          # To keep it out of the repo, set a PROXY_URL repository secret and use
          # ${{ secrets.PROXY_URL }} here instead.
          PROXY_URL: https://4gbpfc2klb.execute-api.eu-west-1.amazonaws.com/prod
